<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="../css/style.css">
    <title>Aplicacion</title>
</head>
<body>
    <header class="barra-herramientas">
        <div class="container-fluid">
            <div class="row gx-2 gy-2 align-items-center justify-content-center text-center">
                <div class="col-12 col-lg-3 col-xl-2">
                    <select class="form-select text-center barra-herramientas__selector">
                        <option value="" disabled selected>Seleccionar un Órgano</option>
                        <option value="pulmon">Pulmón</option>
                        <option value="riñon">Riñón</option>
                    </select>
                </div>

                <div class="col-12 col-lg-4 col-xl-3">
                    <button type="button" class="btn w-100 text-center barra-herramientas__boton">
                        Escanear QR
                    </button>
                </div>

                <div class="col-12 col-lg-auto">
                    <div class="row gx-2 gy-2">
                        <div class="col-12 col-sm-6 col-lg-auto">
                            <input
                                type="text"
                                class="form-control text-center barra-herramientas__entrada"
                                placeholder="dd/mm/aaaa"
                            >
                        </div>
                        <div class="col-12 col-sm-6 col-lg-auto">
                            <input
                                type="text"
                                class="form-control text-center barra-herramientas__entrada"
                                placeholder="dd/mm/aaaa"
                            >
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="aplicacion py-4">
        <div class="container py-4">
            <section class="row g-3 justify-content-center">
                <div class="col-12 col-md-6 col-xl-5">
                    <div class="card shadow-sm h-100">
                        <div class="card-body">
                            <h2 class="h5 mb-0 text-center texto-suave">CASSETTES</h2>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-xl-5">
                    <div class="card shadow-sm h-100">
                        <div class="card-body">
                            <h2 class="h5 mb-0 text-center texto-suave">DETALLE CASSETTE</h2>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-xl-10">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h2 class="h5 mb-0 text-center texto-suave">MUESTRAS</h2>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
