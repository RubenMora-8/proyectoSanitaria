<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="./css/login.css">
    <link rel="shortcut icon" href="./assets/images/LogoRiberaNuevo.png" type="image/x-icon">
</head>
<body class="contenedor-principal">

    <main class="tarjeta-acceso">
        <h1 class="tarjeta-acceso__titulo">Registro</h1>
        
        <form class="formulario-acceso" action="#" method="POST">
            
            <div class="formulario-acceso__campo">
                <input type="text" class="formulario-acceso__entrada" placeholder="Nombre" required>
            </div>

            <div class="formulario-acceso__campo">
                <input type="text" class="formulario-acceso__entrada" placeholder="Apellidos" required>
            </div>

            <div class="formulario-acceso__campo">
                <select class="formulario-acceso__entrada formulario-acceso__entrada--lista">
                    <option value="" disabled selected>Centro</option>
                    <option value="1">IES Ribera del Tajo</option>
                    <option value="2">IES Puerta de Cuartos</option>
                    <option value="3">IES San Isidro</option>
                    <option value="4">IES Padre Juan de Mariana</option>
                </select>
            </div>

            <div class="formulario-acceso__campo">
                <input type="email" class="formulario-acceso__entrada" placeholder="Email" required>
            </div>

            <div class="formulario-acceso__campo">
                <div class="formulario-acceso__contenedor-password">
                    <input type="password" class="formulario-acceso__entrada" placeholder="Contraseña" required data-password-role="principal">
                    <button type="button" class="formulario-acceso__toggle-password" aria-label="Mostrar contraseña" data-password-target="self">
                        <span class="formulario-acceso__icono-ojo" aria-hidden="true">👁</span>
                    </button>
                </div>
                <small class="formulario-acceso__ayuda formulario-acceso__ayuda--oculta"></small>
            </div>

            <button type="submit" class="formulario-acceso__boton-enviar">Registro</button>
            
            <footer class="formulario-acceso__pie">
                <p>Si ya te has registrado anteriormente <a href="./index.html" class="formulario-acceso__enlace">Login</a></p>
            </footer>

        </form>
    </main>

    <script src="./js/script.js"></script>
</body>
</html>
